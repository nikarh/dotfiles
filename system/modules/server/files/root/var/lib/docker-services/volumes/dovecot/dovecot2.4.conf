dovecot_config_version = 2.4.0
dovecot_storage_version = 2.4.0

!include /etc/dovecot/vendor.d/rootless.conf

# Mail locations (mail_location is removed in 2.4)
mail_home = /home/%{user | lower}
mail_driver = maildir
mail_path = ~/mail
mailbox_list_layout = fs
mail_inbox_path = ~/mail/INBOX

mail_uid = 1000
mail_gid = 1000

# Auth
auth_mechanisms = plain
auth_allow_cleartext = yes
auth_username_format = %{user | lower}

auth_cache_size = 1024

passdb pam {
}

userdb static {
  userdb_static_allow_all_users = yes
  fields {
    uid = 1000
    gid = 1000
    home = /home/%{user | lower}
  }
}

# SSL/TLS
ssl = no

# IMAP
protocols {
  imap = yes
}

listen = *

namespace inbox {
  inbox = yes
  separator = /
}

# Logs to Docker stdout
log_path = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stdout

service imap-login {
  chroot =
}
service pop3-login {
  chroot =
}
service submission-login {
  chroot =
}
service managesieve-login {
  chroot =
}
service imap-urlauth-login {
  chroot =
}
