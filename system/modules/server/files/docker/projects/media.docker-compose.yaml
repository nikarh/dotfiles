networks:
  media_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.160/27 # 32 IP addresses
  bitmagnet-postgres:
    ipam:
      driver: default
      config:
        - subnet: 172.31.254.0/24
  macvlan:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.1.252/30
