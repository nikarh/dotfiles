x-service-defaults: &service-defaults
  restart: unless-stopped

x-hardened: &hardened
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

secrets:
  CF_TOKEN:
    file: ../common/docker/secrets/cf_token
volumes:
  traefik-data:
services:
  traefik:
    image: traefik
    container_name: traefik
    <<: [*service-defaults, *hardened]
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 80
    user: "65534:65534"
    ports:
      - 80:80
      - 443:443
    volumes:
      - traefik-data:/data
      - /var/lib/docker-services/volumes/traefik:/etc/traefik:ro
      - "socket-proxy.run:/run/proxy"
    networks:
      authelia_net:
      pi_net:
        aliases: ["authelia.${DOMAIN}"]
    secrets:
      - CF_TOKEN
    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/CF_TOKEN
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.entrypoints=https"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.middlewares=authelia@docker"
      - "traefik.http.routers.api.rule=Host(`traefik.${DOMAIN}`)"
    depends_on:
      init-volumes:
        condition: service_completed_successfully
      docker-socket-proxy:
        condition: "service_healthy"
        restart: true
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 40M
